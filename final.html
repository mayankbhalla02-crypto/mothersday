<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>I Love You all|</title>
    <style>
        body {
            background-color: #FDF6F0; /* Matching your cream theme */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Jost', sans-serif;
            text-align: center;
        }

        .heart {
            color: #C9726B;
            font-size: 100px;
            animation: beat 1.2s infinite;
        }

        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        h1 { color: #6B4226; font-size: 3rem; margin-top: 20px; }
        p { color: #9C7B6E; font-size: 1.2rem; max-width: 80%; }
        
        .home-btn {
            margin-top: 30px;
            text-decoration: none;
            color: #C9726B;
            border: 1px solid #C9726B;
            padding: 10px 20px;
            border-radius: 20px;
            transition: 0.3s;
        }
        .home-btn:hover { background: #C9726B; color: white; }
    </style>
</head>
<body>

    <div class="heart">❤️</div>
    <h1>I Love You, All!</h1>
    <p>Thank you for being my strength, my teacher, and my best friend.</p>
    
    <a href="welcome.html" class="home-btn">Back to Start</a>
    <div style="text-align:center;margin-top:50px;padding-bottom:50px;"><a href="love_you.html"class="next-btn">Click for one last thing...</a></div>
    <a href="../index.html"class="home-btn">See Everything Again</a>

</body>
</html>
